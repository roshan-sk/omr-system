<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — OMR Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;
  --surface:#ffffff;
  --surface-2:#f9fafb;
  --border:#e8eaf0;
  --border-2:#d4d8e4;
  --text-1:#111827;
  --text-2:#4b5563;
  --text-3:#9ca3af;
  --blue:#2563eb;
  --blue-lt:#dbeafe;
  --blue-mid:#eff6ff;
  --green:#16a34a;
  --green-lt:#dcfce7;
  --green-mid:#f0fdf4;
  --red:#dc2626;
  --red-lt:#fee2e2;
  --red-mid:#fef2f2;
  --r-sm:8px;
  --r:12px;
  --r-xl:20px;
  --sh:0 4px 16px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.05);
  --sh-lg:0 16px 48px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.07);
}
html,body{height:100%}
body{
  font-family:'Geist',sans-serif;
  background:var(--bg);
  color:var(--text-1);
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px 16px;
}

.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;text-decoration:none}
.brand-logo{
  width:36px;height:36px;background:var(--blue);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(37,99,235,.35);flex-shrink:0;
  position:relative;overflow:hidden;
}
.brand-logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%)}
.brand-name{font-size:20px;font-weight:800;color:var(--text-1);letter-spacing:-.03em}
.brand-name em{font-style:normal;color:var(--blue)}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:32px 32px 28px;
  width:100%;max-width:420px;
  box-shadow:var(--sh-lg);
}
.card-title{font-size:18px;font-weight:700;color:var(--text-1);letter-spacing:-.02em;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--text-3);margin-bottom:24px;line-height:1.5}

.msg{
  display:none;
  padding:10px 13px;
  border-radius:var(--r-sm);
  font-size:12.5px;
  font-weight:500;
  margin-bottom:16px;
  align-items:flex-start;
  gap:9px;
  line-height:1.45;
}
.msg.err{display:flex;background:var(--red-mid);border:1px solid var(--red-lt);color:var(--red)}
.msg.ok{display:flex;background:var(--green-mid);border:1px solid var(--green-lt);color:var(--green)}
.msg svg{flex-shrink:0;margin-top:1px}

.form-group{margin-bottom:16px}
.form-label{
  display:block;font-size:12px;font-weight:600;
  color:var(--text-2);margin-bottom:6px;letter-spacing:.01em;
}
.form-input{
  width:100%;padding:10px 13px;
  border:1.5px solid var(--border-2);border-radius:var(--r-sm);
  background:var(--surface);font-family:inherit;font-size:13.5px;
  color:var(--text-1);transition:border-color .15s,box-shadow .15s;outline:none;
  appearance: none;-webkit-appearance:none;
}
.form-input:hover{border-color:#b8bfcc}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.form-input.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.1)}
.form-input::placeholder{color:var(--text-3)}

.pw-wrap{position:relative}
.pw-wrap .form-input{padding-right:42px}
.pw-toggle{
  position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text-3);
  padding:4px;display:flex;align-items:center;transition:color .12s;line-height:0;
}
.pw-toggle:hover{color:var(--blue)}

.btn-primary{
  width:100%;padding:11px 16px;
  border-radius:var(--r-sm);border:none;
  background:var(--blue);color:#fff;
  font-size:13.5px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:6px;letter-spacing:.01em;
}
.btn-primary:hover:not(:disabled){background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,99,235,.38)}
.btn-primary:active:not(:disabled){transform:none;box-shadow:none}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-primary svg{flex-shrink:0}

.divider{display:flex;align-items:center;gap:10px;margin:20px 0 16px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:11.5px;color:var(--text-3);font-weight:500;white-space:nowrap}

.link-btn{
  background:none;border:none;cursor:pointer;
  color:var(--blue);font-family:inherit;font-size:12.5px;
  font-weight:500;padding:0;
  text-decoration:underline;text-underline-offset:2px;
}
.link-btn:hover{color:#1d4ed8}

.spinner{
  width:14px;height:14px;flex-shrink:0;
  border:2px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;
  animation:spin .65s linear infinite;
}


@media(max-width:480px){
  .card{padding:24px 18px 20px}
}
</style>
</head>
<body>

<a class="brand" href="#">
  <div class="brand-logo">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
      <rect x="3" y="3" width="6" height="6" rx="1.5" fill="white" opacity=".9"/>
      <rect x="11" y="3" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
      <rect x="3" y="11" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
      <rect x="11" y="11" width="6" height="6" rx="1.5" fill="white" opacity=".3"/>
    </svg>
  </div>
  <span class="brand-name">OMR<em> Analyzer</em></span>
</a>

<div class="card">
  <div class="card-title">Welcome</div>
  <div class="card-sub">Login in to your account to continue</div>

  <div class="msg" id="msg">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="msg-text"></span>
  </div>

  <div class="form-group">
    <label class="form-label" for="email">Email</label>
    <input class="form-input" id="email" type="text" placeholder="you@example.com" autocomplete="email">
  </div>

  <div class="form-group">
    <label class="form-label" for="password">Password</label>
    <div class="pw-wrap">
      <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      <button class="pw-toggle" type="button" onclick="togglePw('password', this)" tabindex="-1" aria-label="Toggle password visibility">
        <svg id="pw-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="btn-primary" id="login-btn" onclick="doLogin()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15">
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
      <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
    </svg>
    Sign In
  </button>

<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  document.getElementById('msg-text').textContent = text;
  m.className = 'msg ' + type;
}

function clearErrors() {
  document.querySelectorAll('.form-input').forEach(i => i.classList.remove('err'));
}

async function doLogin() {
  clearErrors();
  const email = document.getElementById('email');
  const password = document.getElementById('password');
  let valid = true;

  if (!email.value.trim()) { email.classList.add('err'); email.focus(); valid = false; }
  if (!password.value.trim()) { password.classList.add('err'); if (valid) { password.focus(); } valid = false; }
  if (!valid) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing in…';

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email: email.value.trim(), password: password.value })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('Login successful! Redirecting…', 'ok');
      setTimeout(() => window.location.href = '/omr-analyzer', 800);
    } else {
        showMsg(data.msg || 'Login failed', 'err');
    }
  } catch {
    showMsg('Network error. Please check your connection.', 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In`;
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>

<div class="d-flex align-items-center justify-content-between m-b-16 p-x-20 p-t-16">
  <h3>{{ action }} User</h3>
  <button mat-icon-button mat-dialog-close class="d-flex justify-content-center">
    <i-tabler name="x" class="icon-20 d-flex"></i-tabler>
  </button>
</div>

@if (action !== 'Delete') {
<mat-dialog-content>
  <form #userForm="ngForm">
    <div class="row">

      <div class="col-lg-6">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Username</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <input
            type="text"
            matInput
            required
            name="username"
            [(ngModel)]="local_data.username"
            placeholder="Username"
          />
        </mat-form-field>
      </div>

      <div class="col-lg-6">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Email</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <input
            type="email"
            matInput
            required
            name="email"
            [(ngModel)]="local_data.email"
            placeholder="Email"
          />
        </mat-form-field>
      </div>

      <div class="col-lg-6">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Password</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <input
            [type]="showPassword ? 'text' : 'password'"
            matInput
            [required]="action === 'Add'"
            name="password"
            [(ngModel)]="local_data.password"
            placeholder="{{ action === 'Update' ? 'Leave blank to keep old' : 'Password' }}"
          />
          <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword">
            <i-tabler [name]="showPassword ? 'eye-off' : 'eye'" class="icon-18 d-flex"></i-tabler>
          </button>
        </mat-form-field>
      </div>

      <div class="col-lg-6">
        <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Role</mat-label>
        <mat-form-field appearance="outline" class="w-100">
          <mat-select name="role" [(ngModel)]="local_data.role" required>
            <mat-option value="USER">USER</mat-option>
            <mat-option value="ADMIN">ADMIN</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="col-lg-6 d-flex align-items-center gap-16 m-b-16">
        <mat-label class="f-s-14 f-w-600">Status</mat-label>
        <mat-slide-toggle
          name="is_active"
          [(ngModel)]="local_data.is_active"
          color="primary"
        >
          {{ local_data.is_active ? 'Active' : 'Inactive' }}
        </mat-slide-toggle>
      </div>

    </div>

    <button
      mat-flat-button
      color="primary"
      (click)="doAction()"
      [disabled]="!userForm.valid"
    >
      {{ action }}
    </button>
    <button
      mat-flat-button
      class="m-l-8 bg-error text-white"
      (click)="closeDialog()"
    >
      Cancel
    </button>
  </form>
</mat-dialog-content>
}

@else {
<div class="p-x-24 m-y-8">
  <p class="f-s-14">
    Sure to delete <span class="f-w-600">{{ local_data.username }}</span>?
  </p>
</div>
<div mat-dialog-actions class="p-x-24 p-b-24">
  <button (click)="doAction()" mat-flat-button color="warn">{{ action }}</button>
  <button mat-flat-button (click)="closeDialog()" class="m-l-8 bg-error text-white">
    Cancel
  </button>
</div>
}

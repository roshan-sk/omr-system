<mat-card class="cardWithShadow">
  <mat-card-content>
    <div class="row justify-content-between gap-16">
      <div class="col-lg-4">
        <mat-form-field appearance="outline" class="w-100 hide-hint">
          <input
            matInput
            placeholder="Search User"
            (keyup)="applyFilter($any($event.target).value)"
          />
          <mat-icon matSuffix>
            <i-tabler name="search" class="icon-20 d-flex m-t-2"></i-tabler>
          </mat-icon>
        </mat-form-field>
      </div>
      <div class="col-lg-4 d-flex align-items-center justify-content-end">
        <button mat-flat-button (click)="openDialog('Add', {})" color="primary">
          Add User
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>

<mat-card class="cardWithShadow">
  <mat-card-content>

    <div *ngIf="loading" class="p-y-16 text-center">
      <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    </div>

    <!-- <div *ngIf="errorMessage" class="m-b-16">
      <mat-error>{{ errorMessage }}</mat-error>
    </div> -->

    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" class="w-100">

        <!-- INDEX -->
        <ng-container matColumnDef="index">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">#</th>
          <td mat-cell *matCellDef="let element; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <!-- USERNAME -->
        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">Username</th>
          <td mat-cell *matCellDef="let element">
            <h6 class="f-w-600 f-s-16 m-0">{{ element.username }}</h6>
          </td>
        </ng-container>

        <!-- EMAIL -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">Email</th>
          <td mat-cell *matCellDef="let element" class="f-s-14">{{ element.email }}</td>
        </ng-container>

        <!-- ROLE -->
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">Role</th>
          <td mat-cell *matCellDef="let element">
            <span class="role-badge" [class.role-admin]="element.role === 'ADMIN'">
              {{ element.role }}
            </span>
          </td>
        </ng-container>

        <!-- STATUS -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">Status</th>
          <td mat-cell *matCellDef="let element">
            <span class="status-badge" [class.status-active]="element.is_active" [class.status-inactive]="!element.is_active">
              {{ element.is_active ? 'Active' : 'Inactive' }}
            </span>
          </td>
        </ng-container>

        <!-- SHEETS SCANNED -->
        <ng-container matColumnDef="scanned">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">Sheets Scanned</th>
          <td mat-cell *matCellDef="let element" class="f-s-14">
            {{ element.scanned_sheets_count ?? '—' }}
          </td>
        </ng-container>

        <!-- ACTION -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">Action</th>
          <td mat-cell *matCellDef="let element" class="action-link">
            <a (click)="openDialog('Update', element)" class="m-r-10 cursor-pointer">
              <i-tabler name="edit" class="icon-18"></i-tabler>
            </a>
            <a (click)="openDialog('Delete', element)" class="cursor-pointer">
              <i-tabler name="trash" class="icon-18"></i-tabler>
            </a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator
        [pageSizeOptions]="[5, 10, 20]"
        showFirstLastButtons
      ></mat-paginator>
    </div>

  </mat-card-content>
</mat-card>

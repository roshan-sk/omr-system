<!--  -->


<div class="blank-layout-container justify-content-center">
  <div class="position-relative row w-100 h-100">

    <!-- Left panel (template's design — keep as is) -->
    <div class="col-lg-7 col-xl-8 bg-gredient p-0">
      <div class="p-24 h-100">
        <app-branding></app-branding>
        <div class="align-items-center justify-content-center img-height d-none d-lg-flex">
          <img src="/assets/images/backgrounds/login-bg.svg" alt="login" style="max-width: 500px" />
        </div>
      </div>
    </div>

    <!-- Right panel — your login form -->
    <div class="col-lg-5 col-xl-4 p-0">
      <div class="p-32 d-flex align-items-start align-items-lg-center justify-content-center h-100">
        <div class="row justify-content-center w-100">
          <div class="col-lg-9 max-width-form">

            <h4 class="f-w-700 f-s-24 m-0">OMR Analyzer</h4>
            <span class="f-s-14 d-block m-t-8">Sign in to continue</span>

            <!-- Error message -->
            <div *ngIf="errorMessage" class="m-t-16 p-12 bg-light-error text-error rounded">
              {{ errorMessage }}
            </div>

            <!-- Your form -->
            <form class="m-t-30" (ngSubmit)="login()" novalidate>

              <mat-label class="f-s-14 f-w-600 m-b-12 d-block">Email</mat-label>
              <mat-form-field appearance="outline" class="w-100" color="primary">
                <input matInput type="email" [(ngModel)]="email" name="email"
                  placeholder="Enter your email" required autocomplete="email" />
              </mat-form-field>

              <mat-label class="f-s-14 f-w-600 m-b-12 d-block">Password</mat-label>
              <mat-form-field appearance="outline" class="w-100" color="primary">
                <input matInput [type]="showPassword ? 'text' : 'password'"
                  [(ngModel)]="password" name="password"
                  placeholder="Enter your password" required autocomplete="current-password" />
                <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword">
                  <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
              </mat-form-field>

              <button mat-flat-button color="primary" class="w-100 m-t-8"
                type="submit" [disabled]="loading || !email || !password">
                <span *ngIf="!loading">Sign In</span>
                <span *ngIf="loading">Signing in...</span>
              </button>

            </form>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
